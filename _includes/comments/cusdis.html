<!-- Cusdis comment container -->
<style>
  /* Clip the iframe so its internal scrollbar is pushed off-screen */
  #cusdis_thread {
    overflow: hidden;
    position: relative;
  }
  #cusdis_thread iframe {
    width: calc(100% + 20px) !important;
    border: none !important;
    min-height: 500px;
  }
</style>

<div id="cusdis-comments-wrapper" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color, #e0e0e0);">
  <h3 style="margin-bottom: 1.2rem; font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
    <i class="fas fa-comments" style="font-size: 1rem; opacity: 0.6;"></i> Comments
  </h3>
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="85c43613-1962-494f-8161-948b31c0fb63"
    data-page-id="{{ page.url }}"
    data-page-url="{{ page.url | absolute_url }}"
    data-page-title="{{ page.title }}"
  ></div>
</div>

<script>
  (function () {
    // Sync Cusdis theme with Chirpy dark/light mode
    function syncTheme() {
      var mode = document.documentElement.getAttribute('data-mode');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = mode === 'dark' || (mode !== 'light' && prefersDark);
      if (window.CUSDIS && window.CUSDIS.setTheme) {
        window.CUSDIS.setTheme(isDark ? 'dark' : 'light');
      }
    }
    setTimeout(syncTheme, 500);
    new MutationObserver(syncTheme).observe(document.documentElement, {
      attributes: true, attributeFilter: ['data-mode']
    });

    // Listen to Cusdis postMessage height reports and grow the iframe accordingly
    var thread = document.getElementById('cusdis_thread');
    if (thread) {
      window.addEventListener('message', function (e) {
        if (e.origin !== 'https://cusdis.com') return;
        try {
          var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
          if (data && data.from === 'cusdis' && data.height) {
            var iframe = thread.querySelector('iframe');
            if (iframe) {
              iframe.style.height = Math.max(500, data.height + 150) + 'px';
            }
          }
        } catch (err) {}
      });
    }
  })();
</script>

<script defer src="https://cusdis.com/js/cusdis.es.js"></script>
