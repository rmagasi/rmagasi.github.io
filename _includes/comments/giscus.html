<!-- Giscus comment widget — theme resolved before load, no flash -->
<div id="giscus-container" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color, #e0e0e0);"></div>

<script>
(function () {
  function resolveTheme() {
    var mode = document.documentElement.getAttribute('data-mode');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    return (mode === 'dark' || (mode !== 'light' && prefersDark)) ? 'dark_dimmed' : 'light';
  }

  function sendTheme(theme) {
    var frame = document.querySelector('iframe.giscus-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme } } },
        'https://giscus.app'
      );
    }
  }

  // Inject the giscus script dynamically so data-theme is correct from the first load.
  // Chirpy sets data-mode on <html> in <head> before this script runs, so resolveTheme()
  // already knows the correct mode — no flash, no post-load correction needed.
  var script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo',              '{{ site.comments.giscus.repo }}');
  script.setAttribute('data-repo-id',           '{{ site.comments.giscus.repo_id }}');
  script.setAttribute('data-category',          '{{ site.comments.giscus.category }}');
  script.setAttribute('data-category-id',       '{{ site.comments.giscus.category_id }}');
  script.setAttribute('data-mapping',           '{{ site.comments.giscus.mapping | default: "pathname" }}');
  script.setAttribute('data-strict',            '{{ site.comments.giscus.strict | default: "0" }}');
  script.setAttribute('data-reactions-enabled', '{{ site.comments.giscus.reactions_enabled | default: "1" }}');
  script.setAttribute('data-emit-metadata',     '0');
  script.setAttribute('data-input-position',    '{{ site.comments.giscus.input_position | default: "bottom" }}');
  script.setAttribute('data-theme',             resolveTheme());
  script.setAttribute('data-lang',              '{{ site.comments.giscus.lang | default: "en" }}');
  script.setAttribute('data-loading',           'lazy');
  script.setAttribute('crossorigin',            'anonymous');
  script.async = true;
  document.getElementById('giscus-container').appendChild(script);

  // React to Chirpy dark/light toggle after initial load
  new MutationObserver(function () {
    sendTheme(resolveTheme());
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-mode'] });
}());
</script>
