{% if page.title and page.layout != 'home' %}<script>document.title="{{ page.title | escape }} | {{ site.title | escape }}";</script>{% endif %}

<link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" disabled>
<link id="hljs-dark"  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" disabled>
<style>
.language-powershell .rouge-code pre.hljs { background: transparent; }

.csv-header { color: #0078d4; font-weight: 700; }
.csv-comma  { color: #999; }
.csv-val    { color: #333; }
[data-mode="dark"] .csv-header { color: #79c0ff; }
[data-mode="dark"] .csv-val    { color: #e6edf3; }
[data-mode="dark"] .csv-comma  { color: #555; }
@media (prefers-color-scheme: dark) {
  :root:not([data-mode="light"]) .csv-header { color: #79c0ff; }
  :root:not([data-mode="light"]) .csv-val    { color: #e6edf3; }
  :root:not([data-mode="light"]) .csv-comma  { color: #555; }
}

/* VS Code-style code block headers */
div[class^="language-"] { border-top: 2px solid #0078d4 !important; }
div[class^="language-"] .code-header::before { display: none; }
div[class^="language-"] .code-header { padding-left: 0; background-color: #ececec; }
div[class^="language-"] .code-header > span {
  align-self: stretch; padding: 0 1rem;
  background-color: #ffffff; border-right: 1px solid #d0d0d0;
}
div[class^="language-"] .code-header > span i { color: #555 !important; }
div[class^="language-"] .code-header > span::after { color: #333 !important; }

[data-mode="dark"] div[class^="language-"] { border-top-color: #007acc !important; }
[data-mode="dark"] div[class^="language-"] .code-header { background-color: #252526; }
[data-mode="dark"] div[class^="language-"] .code-header > span { background-color: #1e1e1e; border-right-color: #3c3c3c; }
[data-mode="dark"] div[class^="language-"] .code-header > span i { color: #cccccc !important; }
[data-mode="dark"] div[class^="language-"] .code-header > span::after { color: #cccccc !important; }

@media (prefers-color-scheme: dark) {
  :root:not([data-mode="light"]) div[class^="language-"] { border-top-color: #007acc !important; }
  :root:not([data-mode="light"]) div[class^="language-"] .code-header { background-color: #252526; }
  :root:not([data-mode="light"]) div[class^="language-"] .code-header > span { background-color: #1e1e1e; border-right-color: #3c3c3c; }
  :root:not([data-mode="light"]) div[class^="language-"] .code-header > span i { color: #cccccc !important; }
  :root:not([data-mode="light"]) div[class^="language-"] .code-header > span::after { color: #cccccc !important; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/powershell.min.js" defer></script>
<script>
(function () {
  function isDark() {
    var mode = document.documentElement.getAttribute('data-mode');
    return mode === 'dark' || (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
  function applyTheme(dark) {
    document.getElementById('hljs-light').disabled = dark;
    document.getElementById('hljs-dark').disabled  = !dark;
  }
  applyTheme(isDark());
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof hljs !== 'undefined') {
      document.querySelectorAll('.language-powershell code').forEach(function (block) {
        var rougeTable = block.querySelector('.rouge-table');
        if (rougeTable) {
          var codePre = rougeTable.querySelector('.rouge-code pre');
          if (codePre) {
            try {
              var result = hljs.highlight(codePre.textContent, {language: 'powershell'});
              codePre.innerHTML = result.value;
              codePre.classList.add('hljs', 'language-powershell');
            } catch(e) {}
          }
        } else {
          var linenoSpans = Array.from(block.querySelectorAll('.lineno'));
          if (linenoSpans.length > 0) {
            var linenoHTML = linenoSpans.map(function(el) { return el.outerHTML; });
            var clone = block.cloneNode(true);
            clone.querySelectorAll('.lineno').forEach(function(el) { el.remove(); });
            try {
              var result = hljs.highlight(clone.textContent, {language: 'powershell'});
              var lines = result.value.split('\n');
              block.innerHTML = lines.map(function(line, i) { return (linenoHTML[i] || '') + line; }).join('\n');
              block.className = 'hljs language-powershell';
            } catch(e) {}
          } else {
            block.textContent = block.textContent;
            block.className = 'language-powershell';
            try { hljs.highlightElement(block); } catch(e) {}
          }
        }
      });
    }
    document.querySelectorAll('div[file$=".csv"]').forEach(function(div) {
      var pre = div.querySelector('.rouge-code pre') || div.querySelector('pre');
      if (!pre || pre.getAttribute('data-csv-hl')) return;
      pre.setAttribute('data-csv-hl', '1');
      var lines = pre.textContent.replace(/\n$/, '').split('\n');
      pre.innerHTML = lines.map(function(line, i) {
        if (!line.trim()) return '';
        var cells = line.split(',');
        return cells.map(function(cell) {
          var v = cell.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          if (i === 0) return '<span class="csv-header">' + v + '</span>';
          return '<span class="csv-val">' + v + '</span>';
        }).join('<span class="csv-comma">,</span>');
      }).join('\n');
    });

    new MutationObserver(function () {
      applyTheme(isDark());
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-mode'] });
  });
}());
</script>
